<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Alexara Travel | Curated Destinations, Deals & Travel Guides</title>
    <meta name="description" content="Alexara Travel offers expert travel guides, exclusive flight deals, and curated destinations for the modern explorer. Plan your perfect trip with AI-powered travel intelligence." />
    <meta name="keywords" content="travel guides, flight deals, curated destinations, travel tips, luxury travel, budget travel, travel gear" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Alexara Travel" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.alexaratravel.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Alexara Travel" />
    <meta property="og:title" content="Alexara Travel | Curated Destinations, Deals & Travel Guides" />
    <meta property="og:description" content="Expert travel guides, exclusive deals, and curated destinations. Plan your perfect trip with AI-powered travel intelligence." />
    <meta property="og:url" content="https://www.alexaratravel.com/" />
    <meta property="og:image" content="https://www.alexaratravel.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Alexara Travel - Curated Destinations & Deals" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@alexaratravel" />
    <meta name="twitter:title" content="Alexara Travel | Curated Destinations & Deals" />
    <meta name="twitter:description" content="Expert travel guides, exclusive deals, and curated destinations for the modern explorer." />
    <meta name="twitter:image" content="https://www.alexaratravel.com/og-image.jpg" />

    <!-- Organization Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TravelAgency",
      "name": "Alexara Travel",
      "url": "https://www.alexaratravel.com",
      "description": "Alexara Travel offers curated travel experiences, expert destination guides, and exclusive deals for modern explorers.",
      "sameAs": [
        "https://www.instagram.com/alexaratravel/",
        "https://www.tiktok.com/@alexaratravel"
      ],
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "123 Adventure Ave, Suite 400",
        "addressLocality": "New York",
        "addressRegion": "NY",
        "postalCode": "10001",
        "addressCountry": "US"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "email": "hello@alexara.com"
      }
    }
    </script>

    <!-- WebSite Schema with Sitelinks Searchbox -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "url": "https://www.alexaratravel.com",
      "name": "Alexara Travel",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.alexaratravel.com/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Performance: Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://cdn.tailwindcss.com" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: 'var(--color-primary)',
              secondary: 'var(--color-secondary)',
              accent: 'var(--color-accent)',
              surface: 'var(--color-surface)',
            },
            fontFamily: {
              sans: ['var(--font-primary)', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --color-primary: #0f245a;
        --color-secondary: #1aaaba;
        --color-accent: #f59e0b;
        --color-surface: #ffffff;
        --font-primary: 'Open Sans';
      }
      html { scroll-behavior: smooth; }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@^19.2.3",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "react/": "https://esm.sh/react@^19.2.3/",
        "react-router-dom": "https://esm.sh/react-router-dom@^7.11.0",
        "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
        "vite": "https://esm.sh/vite@^7.3.0",
        "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
        "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
      }
    }
    </script>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body class="bg-gray-50 text-slate-800 antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
